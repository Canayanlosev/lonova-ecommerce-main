<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
.wrap { padding: 28px 24px; }
.swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 14px; }
.sw { aspect-ratio: 1.6/1; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; }
.sw .name { font-size: 10px; font-weight: 700; }
.sw .hex { font-size: 9px; font-family: ui-monospace, monospace; opacity: 0.85; }
.title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.sub { font-size: 12px; color: #94a3b8; }
</style></head><body><div class="wrap">
<div class="title">Secondary · Purple accent</div>
<div class="sub">Purple 500. Used for secondary buttons and as the second stop in the rare brand gradient.</div>
<div class="swatches">
  <div class="sw" style="background:#faf5ff;color:#3b0764"><div class="name">purple-50</div><div class="hex">#FAF5FF</div></div>
  <div class="sw" style="background:#d8b4fe;color:#3b0764"><div class="name">purple-300</div><div class="hex">#D8B4FE</div></div>
  <div class="sw" style="background:#c084fc;color:#3b0764"><div class="name">purple-400</div><div class="hex">#C084FC</div></div>
  <div class="sw" style="background:#a855f7;color:#fff;outline:2px solid #fff;outline-offset:-2px"><div class="name">purple-500 ★</div><div class="hex">#A855F7</div></div>
  <div class="sw" style="background:#9333ea;color:#fff"><div class="name">purple-600</div><div class="hex">#9333EA</div></div>
</div>
</div></body></html>
