<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
body { padding: 0; }
.wrap { padding: 28px 24px; }
.swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 14px; }
.sw { aspect-ratio: 1.6/1; border-radius: 12px; display: flex; flex-direction: column; justify-content: space-between; padding: 10px; border: 1px solid rgba(255,255,255,0.06); }
.sw .name { font-size: 10px; font-weight: 700; }
.sw .hex { font-size: 9px; font-family: ui-monospace, monospace; opacity: 0.85; }
.glow { position: absolute; left: 24px; top: 24px; width: 220px; height: 90px; background: #6366f1; opacity: 0.25; filter: blur(70px); border-radius: 50%; pointer-events: none; }
.title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.sub { font-size: 12px; color: #94a3b8; }
</style></head><body><div class="wrap" style="position:relative;">
<div class="glow"></div>
<div class="title">Primary · Brand color</div>
<div class="sub">Indigo 500 — the brand's electric center. Reserved for primary CTAs, active nav, brand wordmark, and the signature glow.</div>
<div class="swatches">
  <div class="sw" style="background:#eef2ff;color:#1e1b4b"><div class="name">indigo-50</div><div class="hex">#EEF2FF</div></div>
  <div class="sw" style="background:#c7d2fe;color:#1e1b4b"><div class="name">indigo-200</div><div class="hex">#C7D2FE</div></div>
  <div class="sw" style="background:#818cf8;color:#fff"><div class="name">indigo-400</div><div class="hex">#818CF8</div></div>
  <div class="sw" style="background:#6366f1;color:#fff;outline:2px solid #fff;outline-offset:-2px"><div class="name">indigo-500 ★</div><div class="hex">#6366F1</div></div>
  <div class="sw" style="background:#4f46e5;color:#fff"><div class="name">indigo-600</div><div class="hex">#4F46E5</div></div>
</div>
</div></body></html>
