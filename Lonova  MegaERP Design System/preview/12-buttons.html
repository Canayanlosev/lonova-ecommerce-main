<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
.wrap { padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; transition: all 0.3s ease-in-out; border-radius: 12px; padding: 10px 24px; font-size: 14px; }
.primary { background: #4f46e5; color: #fff; box-shadow: 0 10px 15px -3px rgba(99,102,241,0.25); }
.secondary { background: #9333ea; color: #fff; }
.outline { background: transparent; color: #818cf8; border: 2px solid #4f46e5; }
.ghost { background: transparent; color: #94a3b8; }
.lg { padding: 14px 32px; font-size: 16px; }
.sm { padding: 6px 12px; font-size: 12px; }
.lbl { font-size: 10px; color: #64748b; font-family: ui-monospace, monospace; text-transform: uppercase; letter-spacing: 0.05em; min-width: 60px; }
</style></head><body><div class="wrap">
<div class="row"><div class="lbl">PRIMARY</div><button class="btn primary lg">Hemen Başlayın</button><button class="btn primary">Giriş Yap</button><button class="btn primary sm">Kaydet</button></div>
<div class="row"><div class="lbl">VARIANT</div><button class="btn secondary">Secondary</button><button class="btn outline">Outline</button><button class="btn ghost">Dokümantasyon</button></div>
</div></body></html>
