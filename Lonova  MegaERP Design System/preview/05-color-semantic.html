<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css"><style>
.wrap { padding: 28px 24px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
.chip { border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 8px; }
.dot { width: 28px; height: 28px; border-radius: 8px; }
.chip .name { font-size: 12px; font-weight: 700; }
.chip .hex { font-size: 10px; font-family: ui-monospace, monospace; color: #94a3b8; }
.title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.sub { font-size: 12px; color: #94a3b8; }
</style></head><body><div class="wrap">
<div class="title">Semantic · Status colors</div>
<div class="sub">Used for deltas, badges, and state. Solid icon over a 10% tinted chip is the canonical container.</div>
<div class="grid">
  <div class="chip"><div class="dot" style="background:#6366f1"></div><div class="name" style="color:#818cf8">Info / Primary</div><div class="hex">#6366F1</div></div>
  <div class="chip"><div class="dot" style="background:#10b981"></div><div class="name" style="color:#34d399">Success</div><div class="hex">#10B981</div></div>
  <div class="chip"><div class="dot" style="background:#f97316"></div><div class="name" style="color:#fb923c">Warning</div><div class="hex">#F97316</div></div>
  <div class="chip"><div class="dot" style="background:#ef4444"></div><div class="name" style="color:#f87171">Danger</div><div class="hex">#EF4444</div></div>
</div>
</div></body></html>
